  <g transform="translate(250,250)">
    <rect x="-230" y="-230" width="200" height="200" rx="14" fill="#E1F5EE"/>
    <rect x="30"   y="-230" width="200" height="200" rx="14" fill="#9FE1CB"/>
    <rect x="-230" y="30"   width="200" height="200" rx="14" fill="#9FE1CB"/>
    <rect x="30"   y="30"   width="200" height="200" rx="14" fill="#E1F5EE"/>
    <rect x="-8" y="-234" width="16" height="468" fill="#1D9E75"/>
    <rect x="-234" y="-5" width="468" height="10" fill="#E1F5EE" opacity="0.6"/>
  </g>
</svg>
