name: Release

# Publishes geocardo to PyPI via Trusted Publishing (OIDC — no API token).
# Triggered by pushing a version tag, e.g. `v0.0.0`. The package version is
# read from the Cargo workspace package version (pyproject `dynamic = ["version"]`),
# so the tag must match that version.
#
# PyPI trusted publisher must be configured to match:
#   project `geocardo` · owner `francbartoli` · repo `geocardo`
#   workflow `release.yml` · environment `pypi`

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wheels:
    name: Wheel (${{ matrix.platform.os }} / ${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, manylinux: auto }
          - { os: macos-latest, target: x86_64 }   # cross-compiled on Apple Silicon (no Intel runner)
          - { os: macos-latest, target: aarch64 }
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v6
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: ${{ matrix.platform.manylinux }}
          sccache: "true"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/geocardo
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
